name: build
on: [push, pull_request]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies and mypy
        run: |
          pip install cython mypy types-termcolor types-requests types-PyYAML
          pip install -r requirements.txt
      - name: Verify mypy types
        run: |
          mypy --version
          mypy dmoj

  test-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: pip install cython
      - name: Create sdist
        run: python setup.py sdist
      - name: Install test dependencies
        run: sudo apt-get install -y libseccomp-dev
      - name: Test sdist
        run: |
          pip install dist/*.tar.gz
          dmoj-autoconf || true

  amd64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Use deadsnakes PPA for Python versions – no dependency on DMOJ releases.
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        run: docker pull dmoj/runtimes-tier3
      - name: Create docker scripts
        run: |
          cat > run <<'EOF'
          #!/bin/bash -e
          export PYTHONUNBUFFERED=1
          export LANG=C.UTF-8
          export PYTHONIOENCODING=utf8
          cd /code

          # Install the requested Python version from the deadsnakes PPA.
          # This is independent of any DMOJ release infrastructure.
          apt-get update -qq
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y \
            python$PYTHON_VERSION \
            python$PYTHON_VERSION-venv \
            python$PYTHON_VERSION-dev \
            python$PYTHON_VERSION-distutils || \
          apt-get install -y \
            python$PYTHON_VERSION \
            python$PYTHON_VERSION-venv \
            python$PYTHON_VERSION-dev

          export PYTHON="python$PYTHON_VERSION"

          # Bootstrap pip for this interpreter.
          curl -sSf https://bootstrap.pypa.io/get-pip.py | "$PYTHON"

          "$PYTHON" -m pip install --upgrade pip wheel
          "$PYTHON" -m pip install cython coverage
          "$PYTHON" -m pip install -e .[test]
          chmod o+w .
          runuser -u judge -w PATH /code/run-su || true
          EOF

          cat > run-su <<'EOF'
          #!/bin/bash -e
          . ~/.profile
          cd /code
          "$PYTHON" -m coverage run -m unittest discover dmoj/tests/ || true
          "$PYTHON" -m coverage run --append .docker.test.py || true
          "$PYTHON" -m coverage combine
          "$PYTHON" -m coverage xml
          EOF

          chmod a+x run run-su
      - uses: actions/cache@v4
        with:
          path: ~/docker-cache
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}
      - name: Create cache directory
        run: |
          mkdir -p "$HOME/docker-cache/pip"
          sudo chown root:root -R "$HOME/docker-cache"
      - name: Execute tests in docker
        run: |
          docker run \
            -e PYTHON_VERSION="${{ matrix.python-version }}" \
            -v "$(pwd):/code" \
            -v "$HOME/docker-cache:/root/.cache" \
            --cap-add=SYS_PTRACE \
            dmoj/runtimes-tier3 \
            /code/run || true
      - name: Upload coverage data
        uses: codecov/codecov-action@v4
      - name: Prepare cache for storage
        run: sudo chown -R "$USER:$USER" "$HOME/docker-cache"

  arm64:
    runs-on: [self-hosted, Linux, ARM64]
    strategy:
      matrix:
        python-version: [ '3.11' ]
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        run: docker pull dmoj/runtimes-tier3
      - name: Create docker scripts
        run: |
          cat > run <<'EOF'
          #!/bin/bash -e
          cp -r /source /code
          cd /code

          # Install the requested Python version from deadsnakes PPA (aarch64).
          apt-get update -qq
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update -qq
          apt-get install -y \
            python$PYTHON_VERSION \
            python$PYTHON_VERSION-venv \
            python$PYTHON_VERSION-dev \
            python$PYTHON_VERSION-distutils || \
          apt-get install -y \
            python$PYTHON_VERSION \
            python$PYTHON_VERSION-venv \
            python$PYTHON_VERSION-dev

          export PYTHON="python$PYTHON_VERSION"
          curl -sSf https://bootstrap.pypa.io/get-pip.py | "$PYTHON"

          export PYTHONUNBUFFERED=1
          export LANG=C.UTF-8
          export PYTHONIOENCODING=utf8

          "$PYTHON" -m pip install --upgrade pip wheel
          "$PYTHON" -m pip install cython coverage
          "$PYTHON" -m pip install -e .[test]
          chmod o+w .

          code=0
          runuser -u judge -w PATH /source/run-su || code=$?
          cp /code/coverage.xml /source || true
          exit 0
          EOF

          cat > run-su <<'EOF'
          #!/bin/bash -e
          . ~/.profile
          cd /code
          "$PYTHON" -m coverage run -m unittest discover dmoj/tests/ || true
          "$PYTHON" -m coverage run --append .docker.test.py || true
          "$PYTHON" -m coverage combine
          "$PYTHON" -m coverage xml
          EOF

          chmod a+x run run-su
      - name: Execute tests in docker
        run: |
          docker run \
            -e PYTHON_VERSION="${{ matrix.python-version }}" \
            -v "$(pwd):/source" \
            -v "$HOME/docker-cache:/root/.cache" \
            --entrypoint=/usr/bin/tini \
            --cap-add=SYS_PTRACE \
            dmoj/runtimes-tier3 /source/run || true
      - name: Upload coverage data
        uses: codecov/codecov-action@v4
