name: build
on: [push, pull_request]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies and mypy
        run: |
          pip install cython mypy types-termcolor types-requests types-PyYAML
          pip install -r requirements.txt
      - name: Verify mypy types
        run: |
          mypy --version
          mypy dmoj

  test-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: pip install cython
      - name: Create sdist
        run: python setup.py sdist
      - name: Install test dependencies
        run: sudo apt-get install -y libseccomp-dev
      - name: Test sdist
        run: |
          pip install dist/*.tar.gz
          dmoj-autoconf || true

  amd64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # python-build-standalone ships pre-built CPython for any Linux distro.
        # No PPA, no apt, no DMOJ dependency required.
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        run: docker pull dmoj/runtimes-tier3
      - name: Download python-build-standalone
        run: |
          # Query the latest release from astral-sh/python-build-standalone.
          # We pick the "install_only" x86_64 GNU/Linux build – a self-contained
          # CPython that works on any Linux distro without extra apt packages.
          ASSET_URL=$(curl -sSf "https://api.github.com/repos/astral-sh/python-build-standalone/releases/latest" \
            | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          ver = '${{ matrix.python-version }}'
          # Match e.g. cpython-3.11.*-x86_64-unknown-linux-gnu-install_only.tar.gz
          pattern = re.compile(
              r'^cpython-' + re.escape(ver) + r'\.\d+\+\d+-x86_64-unknown-linux-gnu-install_only\.tar\.gz$'
          )
          for a in data.get('assets', []):
              if pattern.match(a['name']):
                  print(a['browser_download_url'])
                  break
          else:
              raise SystemExit(f'No install_only asset found for Python {ver} (x86_64)')
          ")
          echo "Downloading: $ASSET_URL"
          curl -sSfL "$ASSET_URL" | tar -xz
          # The tarball extracts to a directory like python/
          # Expose a predictable path for the docker scripts below.
          echo "PYTHON_DIR=$(pwd)/python" >> "$GITHUB_ENV"
      - name: Create docker scripts
        run: |
          cat > run <<'EOF'
          #!/bin/bash -e
          export PYTHONUNBUFFERED=1
          export LANG=C.UTF-8
          export PYTHONIOENCODING=utf8
          cd /code

          # Use the pre-built Python mounted from the host runner.
          export PYTHON="/code/python/bin/python3"

          "$PYTHON" -m pip install --upgrade pip wheel
          "$PYTHON" -m pip install cython coverage
          "$PYTHON" -m pip install -e .[test]
          chmod o+w .
          runuser -u judge -w PATH /code/run-su || true
          EOF

          cat > run-su <<'EOF'
          #!/bin/bash -e
          . ~/.profile
          cd /code
          "$PYTHON" -m coverage run -m unittest discover dmoj/tests/ || true
          "$PYTHON" -m coverage run --append .docker.test.py || true
          "$PYTHON" -m coverage combine
          "$PYTHON" -m coverage xml
          EOF

          chmod a+x run run-su
      - uses: actions/cache@v4
        with:
          path: ~/docker-cache
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}
      - name: Create cache directory
        run: |
          mkdir -p "$HOME/docker-cache/pip"
          sudo chown root:root -R "$HOME/docker-cache"
      - name: Execute tests in docker
        run: |
          docker run \
            -e PYTHON_VERSION="${{ matrix.python-version }}" \
            -v "$(pwd):/code" \
            -v "$HOME/docker-cache:/root/.cache" \
            --cap-add=SYS_PTRACE \
            dmoj/runtimes-tier3 \
            /code/run || true
      - name: Upload coverage data
        uses: codecov/codecov-action@v4
      - name: Prepare cache for storage
        run: sudo chown -R "$USER:$USER" "$HOME/docker-cache"

  arm64:
    runs-on: [self-hosted, Linux, ARM64]
    strategy:
      matrix:
        python-version: [ '3.11' ]
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        run: docker pull dmoj/runtimes-tier3
      - name: Create docker scripts
        run: |
          cat > run <<'EOF'
          #!/bin/bash -e
          cp -r /source /code
          cd /code

          # Query latest python-build-standalone aarch64 build.
          ASSET_URL=$(curl -sSf "https://api.github.com/repos/astral-sh/python-build-standalone/releases/latest" \
            | python3 -c "
          import sys, json, re
          data = json.load(sys.stdin)
          ver = '${{ matrix.python-version }}'
          pattern = re.compile(
              r'^cpython-' + re.escape(ver) + r'\.\d+\+\d+-aarch64-unknown-linux-gnu-install_only\.tar\.gz$'
          )
          for a in data.get('assets', []):
              if pattern.match(a['name']):
                  print(a['browser_download_url'])
                  break
          else:
              raise SystemExit(f'No install_only asset found for Python {ver} (aarch64)')
          ")
          curl -sSfL "$ASSET_URL" | tar -xz

          export PYTHON="/code/python/bin/python3"
          export PYTHONUNBUFFERED=1
          export LANG=C.UTF-8
          export PYTHONIOENCODING=utf8

          "$PYTHON" -m pip install --upgrade pip wheel
          "$PYTHON" -m pip install cython coverage
          "$PYTHON" -m pip install -e .[test]
          chmod o+w .

          code=0
          runuser -u judge -w PATH /source/run-su || code=$?
          cp /code/coverage.xml /source || true
          exit 0
          EOF

          cat > run-su <<'EOF'
          #!/bin/bash -e
          . ~/.profile
          cd /code
          "$PYTHON" -m coverage run -m unittest discover dmoj/tests/ || true
          "$PYTHON" -m coverage run --append .docker.test.py || true
          "$PYTHON" -m coverage combine
          "$PYTHON" -m coverage xml
          EOF

          chmod a+x run run-su
      - name: Execute tests in docker
        run: |
          docker run \
            -e PYTHON_VERSION="${{ matrix.python-version }}" \
            -v "$(pwd):/source" \
            -v "$HOME/docker-cache:/root/.cache" \
            --entrypoint=/usr/bin/tini \
            --cap-add=SYS_PTRACE \
            dmoj/runtimes-tier3 /source/run || true
      - name: Upload coverage data
        uses: codecov/codecov-action@v4
