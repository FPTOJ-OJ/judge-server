name: build
on: [push, pull_request]

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies and mypy
        run: |
          pip install cython mypy types-termcolor types-requests types-PyYAML
          pip install -r requirements.txt
      - name: Verify mypy types
        run: |
          mypy --version
          mypy dmoj

  test-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install build dependencies
        run: pip install cython
      - name: Create sdist
        run: python setup.py sdist
      - name: Install test dependencies
        run: sudo apt-get install -y libseccomp-dev
      - name: Test sdist
        run: |
          pip install dist/*.tar.gz
          dmoj-autoconf || true

  amd64:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Python 3.10–3.13 are the versions available in the latest
        # DMOJ/runtimes-python release. 3.7–3.9 have been dropped upstream.
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        run: docker pull dmoj/runtimes-tier3
      - name: Install python runtime
        run: |
          # Fetch the browser_download_url for the requested version from the
          # GitHub API so we are not hard-coding a specific release tag.
          ASSET_URL=$(curl -sSf "https://api.github.com/repos/DMOJ/runtimes-python/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          ver = '${{ matrix.python-version }}'
          name = f'python{ver}-amd64.tar.gz'
          for a in data.get('assets', []):
              if a['name'] == name:
                  print(a['browser_download_url'])
                  break
          else:
              raise SystemExit(f'Asset {name} not found in latest release')
          ")
          curl -sSfL "$ASSET_URL" | tar -xz
      - name: Create docker scripts
        run: |
          cat > run <<'EOF'
          #!/bin/bash -e
          export PYTHONUNBUFFERED=1
          export LANG=C.UTF-8
          export PYTHONIOENCODING=utf8
          cd /code
          export PYTHON="/code/python${{ matrix.python-version }}/bin/python${{ matrix.python-version }}"
          "$PYTHON" -m pip install --upgrade pip wheel
          "$PYTHON" -m pip install cython coverage
          "$PYTHON" -m pip install -e .[test]
          chmod o+w .
          runuser -u judge -w PATH /code/run-su || true
          EOF

          cat > run-su <<'EOF'
          #!/bin/bash -e
          . ~/.profile
          cd /code
          "$PYTHON" -m coverage run -m unittest discover dmoj/tests/ || true
          "$PYTHON" -m coverage run --append .docker.test.py || true
          "$PYTHON" -m coverage combine
          "$PYTHON" -m coverage xml
          EOF

          chmod a+x run run-su
      - uses: actions/cache@v4
        with:
          path: ~/docker-cache
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}
      - name: Create cache
        run: |
          mkdir -p "$HOME/docker-cache/pip"
          sudo chown root:root -R "$HOME/docker-cache"
      - name: Execute tests in docker
        run: docker run -e PYTHON_VERSION="${{ matrix.python-version }}" -v "$(pwd):/code" -v "$HOME/docker-cache:/root/.cache" --cap-add=SYS_PTRACE dmoj/runtimes-tier3 || true
      - name: Upload coverage data
        uses: codecov/codecov-action@v4
      - name: Prepare cache for storage
        run: sudo chown -R "$USER:$USER" "$HOME/docker-cache"

  arm64:
    runs-on: [self-hosted, Linux, ARM64]
    strategy:
      matrix:
        python-version: [ '3.11' ]
    steps:
      - uses: actions/checkout@v4
      - name: Download docker image
        run: docker pull dmoj/runtimes-tier3
      - name: Create docker scripts
        run: |
          cat > run <<'EOF'
          #!/bin/bash -e
          cp -r /source /code
          cd /code

          # Resolve the asset URL dynamically so we never hard-code a stale tag.
          ASSET_URL=$(curl -sSf "https://api.github.com/repos/DMOJ/runtimes-python/releases/latest" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          ver = '${{ matrix.python-version }}'
          name = f'python{ver}-aarch64.tar.gz'
          for a in data.get('assets', []):
              if a['name'] == name:
                  print(a['browser_download_url'])
                  break
          else:
              raise SystemExit(f'Asset {name} not found in latest release')
          ")
          curl -sSfL "$ASSET_URL" | tar -xz

          export PYTHONUNBUFFERED=1
          export LANG=C.UTF-8
          export PYTHONIOENCODING=utf8
          export PYTHON="/code/python${{ matrix.python-version }}/bin/python${{ matrix.python-version }}"

          "$PYTHON" -m pip install --upgrade pip wheel
          "$PYTHON" -m pip install cython coverage
          "$PYTHON" -m pip install -e .[test]
          chmod o+w .

          code=0
          runuser -u judge -w PATH /source/run-su || code=$?
          cp /code/coverage.xml /source || true
          exit 0
          EOF

          cat > run-su <<'EOF'
          #!/bin/bash -e
          . ~/.profile
          cd /code
          "$PYTHON" -m coverage run -m unittest discover dmoj/tests/ || true
          "$PYTHON" -m coverage run --append .docker.test.py || true
          "$PYTHON" -m coverage combine
          "$PYTHON" -m coverage xml
          EOF

          chmod a+x run run-su
      - name: Execute tests in docker
        run: |
          docker run -e PYTHON_VERSION="${{ matrix.python-version }}" -v "$(pwd):/source" -v "$HOME/docker-cache:/root/.cache" \
            --entrypoint=/usr/bin/tini --cap-add=SYS_PTRACE dmoj/runtimes-tier3 /source/run || true
      - name: Upload coverage data
        uses: codecov/codecov-action@v4
